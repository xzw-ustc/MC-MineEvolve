  max_minutes: 10
  initial_inventory: []
  prefer_biome: plains
  times: 1

evaluate: []

all_task:
  - {id: 0, type: craft, instruction: "Craft a golden pickaxe"}
  - {id: 1, type: craft, instruction: "Craft a golden axe"}
  - {id: 2, type: craft, instruction: "Craft a golden sword"}
  - {id: 3, type: craft, instruction: "Craft a golden hoe"}
  - {id: 4, type: craft, instruction: "Craft a golden apple"}
  - {id: 5, type: craft, instruction: "Craft a golden carrot"}
  - {id: 6, type: smelt, instruction: "Smelt gold ore into gold ingot"}
